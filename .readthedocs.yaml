# .readthedocs.yaml
# Read the Docs configuration file (v2)
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

# Instala o pacote e as dependências para build da documentação
python:
  install:
    - method: pip
      path: .
    - requirements: mkdocs_docs/requirements.txt

# Aponta para o arquivo de configuração do MkDocs
mkdocs:
  configuration: mkdocs.yml
